# Fly.io configuration. Replace `app` name on first `fly launch`.
# Fly will pick this up automatically; no need to override.
app = "tilt-agents-abylai"
primary_region = "fra"  # Frankfurt — pick whatever's near your mentors

[build]

[env]
  REAL_DAILY_LIMIT = "10"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # SSE-friendly idle timeout (default 60s drops streams mid-run).
  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
